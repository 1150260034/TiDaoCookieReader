name: Build Android APK
description: 设置 JDK、Gradle 并构建 Android APK

inputs:
  variant:
    description: 构建变体，Debug 或 Release
    required: false
    default: Debug
  java-version:
    description: Java 版本
    required: false
    default: "17"
  gradle-version:
    description: Gradle 版本，默认使用项目 wrapper 版本
    required: false
    default: "wrapper"
  cache-read-only:
    description: Gradle 缓存是否为只读模式
    required: false
    default: "false"
  version-code:
    description: 覆盖 versionCode（留空则使用 build.gradle 默认值）
    required: false
    default: ""
  release-keystore-base64:
    description: Release keystore 的 Base64 内容（仅 Release 构建需要）
    required: false
    default: ""
  release-store-password:
    description: Release keystore 密码（仅 Release 构建需要）
    required: false
    default: ""
  release-key-alias:
    description: Release key alias（仅 Release 构建需要）
    required: false
    default: ""
  release-key-password:
    description: Release key 密码（仅 Release 构建需要）
    required: false
    default: ""
  api-token:
    description: 云函数 API Token（注入 BuildConfig.API_TOKEN）
    required: false
    default: ""
  fc-url:
    description: 云函数 HTTP URL（注入 BuildConfig.FC_URL）
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Validate unified debug keystore
      if: ${{ inputs.variant == 'Debug' }}
      shell: bash
      run: |
        if [ ! -f app/debug.keystore ]; then
          echo "::error::缺少 app/debug.keystore，无法保证本地与 CI 的 Debug APK 签名一致。"
          exit 1
        fi

    - name: Validate release signing inputs
      if: ${{ inputs.variant == 'Release' }}
      shell: bash
      env:
        RELEASE_KEYSTORE_BASE64: ${{ inputs.release-keystore-base64 }}
        RELEASE_STORE_PASSWORD: ${{ inputs.release-store-password }}
        RELEASE_KEY_ALIAS: ${{ inputs.release-key-alias }}
        RELEASE_KEY_PASSWORD: ${{ inputs.release-key-password }}
      run: |
        if [ -z "$RELEASE_KEYSTORE_BASE64" ] || \
           [ -z "$RELEASE_STORE_PASSWORD" ] || \
           [ -z "$RELEASE_KEY_ALIAS" ] || \
           [ -z "$RELEASE_KEY_PASSWORD" ]; then
          echo "::error::Release 构建缺少签名参数，请在 workflow secrets 中配置后再发布。"
          exit 1
        fi

    - name: Prepare release keystore
      if: ${{ inputs.variant == 'Release' }}
      shell: bash
      env:
        RELEASE_KEYSTORE_BASE64: ${{ inputs.release-keystore-base64 }}
      run: |
        printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore

    - name: Build APK
      shell: bash
      env:
        RELEASE_KEY_ALIAS: ${{ inputs.release-key-alias }}
        RELEASE_STORE_PASSWORD: ${{ inputs.release-store-password }}
        RELEASE_KEY_PASSWORD: ${{ inputs.release-key-password }}
        API_TOKEN: ${{ inputs.api-token }}
        FC_URL: ${{ inputs.fc-url }}
      run: |
        chmod +x gradlew
        EXTRA_ARGS=(--no-daemon)
        if [ -n "${{ inputs.version-code }}" ]; then
          EXTRA_ARGS+=("-PciVersionCode=${{ inputs.version-code }}")
        fi
        if [ "${{ inputs.variant }}" = "Release" ]; then
          EXTRA_ARGS+=("-PreleaseStoreFile=$PWD/release.keystore")
        fi
        EXTRA_ARGS+=("assemble${{ inputs.variant }}")
        ./gradlew "${EXTRA_ARGS[@]}"

    - name: Cleanup release keystore
      if: ${{ always() && inputs.variant == 'Release' }}
      shell: bash
      run: |
        rm -f release.keystore
