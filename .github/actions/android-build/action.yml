name: Build Android APK
description: 设置 JDK、Gradle 并构建 Android APK

inputs:
  variant:
    description: 构建变体，Debug 或 Release
    required: false
    default: Debug
  java-version:
    description: Java 版本
    required: false
    default: '17'
  gradle-version:
    description: Gradle 版本，默认使用项目 wrapper 版本
    required: false
    default: 'wrapper'
  cache-read-only:
    description: Gradle 缓存是否为只读模式
    required: false
    default: 'false'
  version-code:
    description: 覆盖 versionCode（留空则使用 build.gradle 默认值）
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Validate unified debug keystore
      if: ${{ inputs.variant == 'Debug' }}
      shell: bash
      run: |
        if [ ! -f app/debug.keystore ]; then
          echo "::error::缺少 app/debug.keystore，无法保证本地与 CI 的 Debug APK 签名一致。"
          exit 1
        fi

    - name: Build APK
      shell: bash
      run: |
        chmod +x gradlew
        EXTRA_ARGS=""
        if [ -n "${{ inputs.version-code }}" ]; then
          EXTRA_ARGS="-PciVersionCode=${{ inputs.version-code }}"
        fi
        ./gradlew --no-daemon $EXTRA_ARGS assemble${{ inputs.variant }}
