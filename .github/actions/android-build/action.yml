name: Build Android APK
description: 设置 JDK、Gradle 并构建 Android APK

inputs:
  variant:
    description: 构建变体，Debug 或 Release
    required: false
    default: Debug
  java-version:
    description: Java 版本
    required: false
    default: '17'
  gradle-version:
    description: Gradle 版本，默认使用项目 wrapper 版本
    required: false
    default: 'wrapper'
  cache-read-only:
    description: Gradle 缓存是否为只读模式
    required: false
    default: 'false'
  version-code:
    description: 覆盖 versionCode（留空则使用 build.gradle 默认值）
    required: false
    default: ''
  release-keystore-base64:
    description: Release keystore 的 Base64 内容（仅 Release 构建需要）
    required: false
    default: ''
  release-store-password:
    description: Release keystore 密码（仅 Release 构建需要）
    required: false
    default: ''
  release-key-alias:
    description: Release key alias（仅 Release 构建需要）
    required: false
    default: ''
  release-key-password:
    description: Release key 密码（仅 Release 构建需要）
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Validate unified debug keystore
      if: ${{ inputs.variant == 'Debug' }}
      shell: bash
      run: |
        if [ ! -f app/debug.keystore ]; then
          echo "::error::缺少 app/debug.keystore，无法保证本地与 CI 的 Debug APK 签名一致。"
          exit 1
        fi

    - name: Validate release signing inputs
      if: ${{ inputs.variant == 'Release' }}
      shell: bash
      run: |
        if [ -z "${{ inputs.release-keystore-base64 }}" ] || \
           [ -z "${{ inputs.release-store-password }}" ] || \
           [ -z "${{ inputs.release-key-alias }}" ] || \
           [ -z "${{ inputs.release-key-password }}" ]; then
          echo "::error::Release 构建缺少签名参数，请在 workflow secrets 中配置后再发布。"
          exit 1
        fi

    - name: Prepare release keystore
      if: ${{ inputs.variant == 'Release' }}
      shell: bash
      run: |
        echo "${{ inputs.release-keystore-base64 }}" | base64 -d > release.keystore

    - name: Build APK
      shell: bash
      run: |
        chmod +x gradlew
        EXTRA_ARGS=""
        if [ -n "${{ inputs.version-code }}" ]; then
          EXTRA_ARGS="-PciVersionCode=${{ inputs.version-code }}"
        fi
        if [ "${{ inputs.variant }}" = "Release" ]; then
          EXTRA_ARGS="$EXTRA_ARGS -PreleaseStoreFile=$PWD/release.keystore"
          EXTRA_ARGS="$EXTRA_ARGS -PreleaseStorePassword=${{ inputs.release-store-password }}"
          EXTRA_ARGS="$EXTRA_ARGS -PreleaseKeyAlias=${{ inputs.release-key-alias }}"
          EXTRA_ARGS="$EXTRA_ARGS -PreleaseKeyPassword=${{ inputs.release-key-password }}"
        fi
        ./gradlew --no-daemon $EXTRA_ARGS assemble${{ inputs.variant }}
