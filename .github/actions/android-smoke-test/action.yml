name: Android Smoke Test
description: 使用 android-emulator-runner 运行最小 UI 冒烟测试

inputs:
  cache-read-only:
    description: Gradle 缓存是否为只读模式
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Run emulator smoke test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 31
        target: google_apis
        arch: x86_64
        profile: pixel_6
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
        disable-animations: true
        emulator-boot-timeout: 900
        script: timeout 25m ./gradlew --no-daemon --stacktrace connectedDebugAndroidTest
