name: Android Smoke Test
description: 使用 AGP Managed Virtual Device 运行最小 UI 冒烟测试

inputs:
  cache-read-only:
    description: Gradle 缓存是否为只读模式
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper
        cache-read-only: ${{ inputs.cache-read-only }}

    - name: Run managed device smoke test
      shell: bash
      run: |
        set -euo pipefail
        chmod +x gradlew
        ./gradlew --no-daemon pixel6Api31DebugAndroidTest
