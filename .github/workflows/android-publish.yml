name: Android Publish

# 复用 Android CI 的冒烟测试结果，避免同一次 push 重复运行冒烟测试：
# - android-build.yml 在 push 到 main/master 时已运行 validate 和 smoke-test
# - 本 workflow 等待 Android CI 成功后直接执行 publish，不再重复跑冒烟测试
# - branches 过滤确保只有 main/master 的 push 才会触发（fork PR 不会触发 publish）
on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
    branches: [main, master]

concurrency:
  group: publish-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish Latest
    runs-on: ubuntu-latest
    # 只在 Android CI 成功时继续
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if publish paths changed
        id: check-paths
        run: |
          git diff --name-only HEAD~1 HEAD | grep -qE '^(app/|build\.gradle$|settings\.gradle$|gradle\.properties$|gradle/|gradlew$|gradlew\.bat$|scripts/)' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup Android SDK
        if: steps.check-paths.outputs.changed == 'true'
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        if: steps.check-paths.outputs.changed == 'true'
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: false
          version-code: ${{ github.event.workflow_run.run_number }}

      - name: Publish latest release
        if: steps.check-paths.outputs.changed == 'true'
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=${{ github.event.workflow_run.run_number }}
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-12)
          TAG_NAME="latest"
          APK_NAME="TiDaoCookieReader-latest.apk"
          RELEASE_NOTES="$(printf '## 最新版本 v%s\n\n- **版本号**: v%s (build %s)\n- **构建分支**: %s\n- **提交**: %s\n- **时间**: %s' "${VERSION_NAME}" "${VERSION_NAME}" "${VERSION_CODE}" "${{ github.event.workflow_run.head_branch }}" "${SHORT_SHA}" "${{ github.event.workflow_run.updated_at }}")"

          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/${APK_NAME}"

          # 删除旧 latest release 及其 tag（幂等，失败时忽略）
          gh release delete "${TAG_NAME}" --yes --cleanup-tag 2>/dev/null || true

          # 创建非 prerelease 的 latest release，确保 /releases/latest API 可见
          gh release create "${TAG_NAME}" \
            --title "最新版本 v${VERSION_NAME} (Build ${VERSION_CODE})" \
            --notes "${RELEASE_NOTES}" \
            "app/build/outputs/apk/debug/${APK_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
