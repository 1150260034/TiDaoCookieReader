name: Android Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate Android Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

  smoke-test:
    name: Smoke Test Before Publish
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shared smoke test action
        uses: ./.github/actions/android-smoke-test

  publish:
    name: Publish Prerelease
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: false

      - name: Publish prerelease
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' app/build.gradle)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          TAG_NAME="v${VERSION_NAME}-${SHORT_SHA}"
          APK_NAME="TiDaoCookieReader-${TAG_NAME}.apk"
          RELEASE_NOTES="$(printf '## 预发布构建\n\n- **版本号**: v%s (build %s)\n- **Tag**: %s\n- **构建分支**: %s\n- **提交**: %s\n- **时间**: %s' "${VERSION_NAME}" "${VERSION_CODE}" "${TAG_NAME}" "${{ github.ref_name }}" "${SHORT_SHA}" "${{ github.event.head_commit.timestamp }}")"

          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/${APK_NAME}"

          # 删除同名 prerelease 及其 tag（幂等，失败时忽略）
          gh release delete "${TAG_NAME}" --yes --cleanup-tag 2>/dev/null || true

          # 以 v{VERSION_NAME}-{SHA12} 创建 prerelease
          gh release create "${TAG_NAME}" \
            --prerelease \
            --title "预发布 ${TAG_NAME}" \
            --notes "${RELEASE_NOTES}" \
            "app/build/outputs/apk/debug/${APK_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
