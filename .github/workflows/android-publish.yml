name: Android Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/**'
      - '.github/actions/android-build/action.yml'
      - '.github/workflows/android-publish.yml'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  smoke-test:
    name: Smoke Test Before Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            chmod +x gradlew
            ./gradlew --no-daemon connectedDebugAndroidTest
            adb logcat -c
            adb shell am start -W -n com.tidao.wuxia.app/.ui.MainActivity
            sleep 5
            if adb logcat -d | grep -E "FATAL EXCEPTION|AndroidRuntime|Unable to get provider|Process: com.tidao.wuxia.app"; then
              echo "检测到启动崩溃"
              exit 1
            fi

  publish:
    name: Publish Prerelease
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: false

      - name: Publish latest release
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' app/build.gradle)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          APK_NAME="TiDaoCookieReader-latest.apk"
          RELEASE_NOTES="$(printf '## 最新构建\n\n- **版本号**: v%s (build %s)\n- **构建分支**: %s\n- **提交**: %s\n- **时间**: %s' "${VERSION_NAME}" "${VERSION_CODE}" "${{ github.ref_name }}" "${SHORT_SHA}" "${{ github.event.head_commit.timestamp }}")"

          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/${APK_NAME}"

          # 删除旧的 latest release 及其 tag（幂等，失败时忽略）
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          # 强制推送新的 latest tag
          git tag -f latest
          git push origin refs/tags/latest --force

          # 创建新的 latest release（非 prerelease，确保 /releases/latest API 可命中）
          gh release create latest \
            --title "最新版本 v${VERSION_NAME}" \
            --notes "${RELEASE_NOTES}" \
            "app/build/outputs/apk/debug/${APK_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
