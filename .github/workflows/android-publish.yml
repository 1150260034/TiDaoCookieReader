name: Android Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/actions/android-build/action.yml'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish Prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: false

      - name: Publish prerelease
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' app/build.gradle)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          TAG_NAME="v${VERSION_NAME}-${SHORT_SHA}"
          APK_NAME="TiDaoCookieReader-${TAG_NAME}.apk"

          # 幂等：若该 tag 的 release 已存在则跳过发布
          if gh release view "${TAG_NAME}" &>/dev/null; then
            echo "Release ${TAG_NAME} already exists, skipping."
            exit 0
          fi

          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/${APK_NAME}"

          RELEASE_NOTES="$(printf '## 预发布版本\n\n- **版本号**: v%s (build %s)\n- **构建分支**: %s\n- **提交**: %s\n- **时间**: %s' "${VERSION_NAME}" "${VERSION_CODE}" "${{ github.ref_name }}" "${SHORT_SHA}" "${{ github.event.head_commit.timestamp }}")"

          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes "${RELEASE_NOTES}" \
            --prerelease \
            "app/build/outputs/apk/debug/${APK_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
