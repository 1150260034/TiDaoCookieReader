name: Android Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Validate Android Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

  smoke-test:
    name: Smoke Test Before Publish
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run shared smoke test action
        uses: ./.github/actions/android-smoke-test

  publish:
    name: Publish Latest
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: false
          version-code: ${{ github.run_number }}

      - name: Publish latest release
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=${{ github.run_number }}
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          TAG_NAME="latest"
          APK_NAME="TiDaoCookieReader-latest.apk"
          RELEASE_NOTES="$(printf '## 最新版本 v%s\n\n- **版本号**: v%s (build %s)\n- **构建分支**: %s\n- **提交**: %s\n- **时间**: %s' "${VERSION_NAME}" "${VERSION_NAME}" "${VERSION_CODE}" "${{ github.ref_name }}" "${SHORT_SHA}" "${{ github.event.head_commit.timestamp }}")"

          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/${APK_NAME}"

          # 删除旧 latest release 及其 tag（幂等，失败时忽略）
          gh release delete "${TAG_NAME}" --yes --cleanup-tag 2>/dev/null || true

          # 创建非 prerelease 的 latest release，确保 /releases/latest API 可见
          gh release create "${TAG_NAME}" \
            --title "最新版本 v${VERSION_NAME} (Build ${VERSION_CODE})" \
            --notes "${RELEASE_NOTES}" \
            "app/build/outputs/apk/debug/${APK_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
