name: Android CI

# 触发规则（排除法）：
# - 文档类变更（*.md、docs/**）：不触发 CI
# - CI 工作流类变更（.github/**）：触发 CI + 冒烟测试，但 android-publish.yml 通过
#   git diff 路径检查排除 .github/，不会触发发版
# - 代码类变更（app/、build.gradle 等）：触发 CI + 冒烟测试，android-publish.yml
#   等待本 workflow 成功后通过 workflow_run 发版，冒烟测试全程只跑一次
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Android Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          version-code: ${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  smoke-test:
    name: Smoke Test on Emulator
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run shared smoke test action
        uses: ./.github/actions/android-smoke-test
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
