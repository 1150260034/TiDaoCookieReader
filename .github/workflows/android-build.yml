name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        run: gradle --no-daemon assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish rolling latest release
        if: github.event_name == 'push'
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          cp "app/build/outputs/apk/debug/app-debug.apk" "app/build/outputs/apk/debug/TiDaoCookieReader-debug-v${VERSION_NAME}.apk"
          if gh release view latest > /dev/null 2>&1; then
            echo "Deleting existing latest release..."
            gh release delete latest --cleanup-tag --yes
          else
            echo "No existing latest release found, skipping deletion."
          fi
          gh release create latest \
            --title "Latest Build (v${VERSION_NAME})" \
            --notes "Auto-built from commit ${{ github.sha }} on branch ${{ github.ref_name }}" \
            --prerelease \
            "app/build/outputs/apk/debug/TiDaoCookieReader-debug-v${VERSION_NAME}.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
