name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build Debug and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            ./gradlew --no-daemon assembleDebug && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 30s..." && sleep 30
            [ $attempt -eq 3 ] && exit 1
          done

      - name: Build Release APK (unsigned)
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            ./gradlew --no-daemon assembleRelease && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 30s..." && sleep 30
            [ $attempt -eq 3 ] && exit 1
          done

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish rolling latest release
        if: github.event_name == 'push'
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          if gh release view latest > /dev/null 2>&1; then
            echo "Deleting existing latest release..."
            gh release delete latest --cleanup-tag --yes
          else
            echo "No existing latest release found, skipping deletion."
          fi
          gh release create latest \
            --title "Latest Build (v${VERSION_NAME})" \
            --notes "Auto-built from commit ${{ github.sha }} on branch ${{ github.ref_name }}" \
            --prerelease \
            app/build/outputs/apk/debug/*.apk \
            app/build/outputs/apk/release/*.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
