name: Android CI

# 路径白名单说明：
# - 相比 android-publish.yml，此处额外包含 scripts/** 和 .github/** 路径，
#   目的是在 CI 脚本或工作流定义变更时同样触发构建验证。
# - publish 工作流不需要因 CI 配置变更而重新发布 APK，因此两者白名单有意不同。
# - GitHub Actions 不支持 YAML 锚点，push 与 pull_request 下的 paths 只能各写一份，
#   修改时请同步更新两处。
on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Android Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          version-code: ${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  smoke-test:
    name: Smoke Test on Emulator
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run shared smoke test action
        uses: ./.github/actions/android-smoke-test
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
