name: Android CI

# 使用 paths-ignore（排除法）而非 paths（白名单）:
# - 新增 Android 模块或配置文件时无需手动更新此列表，自动触发 CI
# - 排除列表远比白名单短，push 与 pull_request 两处保持一致的成本更低
# - android-publish.yml 仍使用严格的 paths 白名单（发布不应因文档/CI 配置变更触发）
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Android Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate file_paths.xml
        run: |
          chmod +x scripts/validate-file-paths.sh
          ./scripts/validate-file-paths.sh

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        uses: ./.github/actions/android-build
        with:
          variant: Debug
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          version-code: ${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  smoke-test:
    name: Smoke Test on Emulator
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run shared smoke test action
        uses: ./.github/actions/android-smoke-test
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
