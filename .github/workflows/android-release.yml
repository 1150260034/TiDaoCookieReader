name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            ./gradlew --no-daemon assembleRelease && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 30s..." && sleep 30
            [ $attempt -eq 3 ] && exit 1
          done

      - name: Rename APK with tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$APK_PATH" "app/build/outputs/apk/release/TiDaoCookieReader-${TAG_NAME}.apk"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/TiDaoCookieReader-*.apk
          generate_release_notes: true
