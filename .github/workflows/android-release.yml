name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release APK
        uses: ./.github/actions/android-build
        with:
          variant: Release
          cache-read-only: false
          version-code: ${{ github.run_number }}
          release-keystore-base64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-store-password: ${{ secrets.RELEASE_STORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}
          api-token: ${{ secrets.API_TOKEN }}
          fc-url: ${{ secrets.FC_URL }}

      - name: Rename APK with version info
        id: apk_info
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION_NAME=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)
          VERSION_CODE=${{ github.run_number }}
          APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          cp "$APK_PATH" "app/build/outputs/apk/release/TiDaoCookieReader-${TAG_NAME}.apk"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/TiDaoCookieReader-*.apk
          generate_release_notes: true
          body: |
            ## 版本信息

            - **版本号**: v${{ steps.apk_info.outputs.version_name }}

            ## 更新内容

            <!-- 请在发布前手动编辑此说明，或通过 GitHub Release 页面填写 -->
            _下方自动生成本次 Release 包含的提交记录。_

      - name: Upload Release APK to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ] || [ -z "$OSS_ACCESS_KEY_SECRET" ] || [ -z "$OSS_BUCKET_NAME" ] || [ -z "$OSS_REGION" ]; then
            echo "OSS secrets 未配置，跳过上传步骤"
            exit 0
          fi

          # 安装 ossutil
          curl -fsSL https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip -o ossutil.zip
          unzip -q ossutil.zip -d ossutil_tmp
          chmod +x ossutil_tmp/ossutil-v1.7.19-linux-amd64/ossutil64
          OSSUTIL="./ossutil_tmp/ossutil-v1.7.19-linux-amd64/ossutil64"

          # 配置 AK/SK
          $OSSUTIL config -e "oss-${OSS_REGION#oss-}.aliyuncs.com" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

          VERSION_NAME="${{ steps.apk_info.outputs.version_name }}"
          VERSION_CODE="${{ steps.apk_info.outputs.version_code }}"
          APK_FILE=$(ls app/build/outputs/apk/release/TiDaoCookieReader-*.apk | head -n 1)
          OSS_APK_KEY="app-v${VERSION_NAME}.bin"

          # 上传 APK
          $OSSUTIL cp "$APK_FILE" "oss://${OSS_BUCKET_NAME}/${OSS_APK_KEY}" -f
          echo "Release APK 已上传: oss://${OSS_BUCKET_NAME}/${OSS_APK_KEY}"

          # 生成并上传 version.json
          cat > version.json << EOF
          {
            "version": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "downloadUrl": "https://${OSS_BUCKET_NAME}.${OSS_REGION}.aliyuncs.com/${OSS_APK_KEY}",
            "changelog": "Release v${VERSION_NAME}",
            "forceUpdate": false
          }
          EOF
          $OSSUTIL cp version.json "oss://${OSS_BUCKET_NAME}/version.json" -f
          echo "version.json 已更新"
