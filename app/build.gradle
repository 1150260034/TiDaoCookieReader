plugins {
    id 'com.android.application'
}

def releaseStoreFile = (project.findProperty('releaseStoreFile') ?: '').toString()
def releaseStorePassword = (project.findProperty('releaseStorePassword') ?: System.getenv('RELEASE_STORE_PASSWORD') ?: '').toString()
def releaseKeyAlias = (project.findProperty('releaseKeyAlias') ?: System.getenv('RELEASE_KEY_ALIAS') ?: '').toString()
def releaseKeyPassword = (project.findProperty('releaseKeyPassword') ?: System.getenv('RELEASE_KEY_PASSWORD') ?: '').toString()
def hasReleaseSigning = !releaseStoreFile.isEmpty() &&
    !releaseStorePassword.isEmpty() &&
    !releaseKeyAlias.isEmpty() &&
    !releaseKeyPassword.isEmpty()

android {
    namespace 'com.tidao.wuxia.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.tidao.wuxia.app"
        minSdk 26
        targetSdk 34
        // CI 通过 -PciVersionCode=N 传入自增版本号；本地开发使用默认值
        versionCode project.hasProperty('ciVersionCode') ? project.property('ciVersionCode').toInteger() : 4
        versionName "1.2.2"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // 云函数更新检查：CI 构建时通过环境变量注入，本地开发为空串（自动走 GitHub 通道）
        // 注意：API_TOKEN 有意编译进 APK。云函数本身就是公开服务（返回最新版本信息），
        // 此 Token 仅用于基础的请求来源标识，不承担访问控制职责，无需保密。
        buildConfigField "String", "API_TOKEN", "\"${System.getenv('API_TOKEN') ?: ''}\""        
        buildConfigField "String", "FC_URL", "\"${System.getenv('FC_URL') ?: ''}\""
        buildConfigField "String", "CLOUD_RELEASES_PAGE_URL", "\"${System.getenv('CLOUD_RELEASES_PAGE_URL') ?: ''}\""
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        debug {
            // 统一本地与 CI 的 Debug 签名，避免覆盖安装时提示先卸载。
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            // 仅在显式传入签名参数时启用 Release 签名，本地未配置时保持默认行为。
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    testOptions {
        managedDevices {
            devices {
                pixel6Api31(com.android.build.api.dsl.ManagedVirtualDevice) {
                    device = "Pixel 6"
                    apiLevel = 31
                    systemImageSource = "google"
                }
            }
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
